<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wall·Hub — 精美壁纸</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f7f7f5;
      --text: #1a1a18;
      --text2: #6b6b68;
      --border: rgba(0,0,0,0.1);
      --blue: #378ADD;
      --blue-light: #E6F1FB;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg2: #242422;
        --text: #f0ede8;
        --text2: #999894;
        --border: rgba(255,255,255,0.1);
        --blue-light: #0C447C;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 18px; font-weight: 500; text-decoration: none; color: var(--text); }
    .logo span { color: var(--blue); }
    nav { display: flex; gap: 1.5rem; }
    nav a { font-size: 14px; color: var(--text2); text-decoration: none; transition: color 0.15s; }
    nav a:hover { color: var(--text); }

    /* ── Hero ── */
    .hero {
      padding: 4rem 2rem 2.5rem;
      max-width: 680px;
      margin: 0 auto;
      text-align: center;
    }
    .hero h1 { font-size: 32px; font-weight: 500; margin-bottom: 12px; }
    .hero p { font-size: 16px; color: var(--text2); margin-bottom: 2rem; line-height: 1.6; }
    .search-wrap { display: flex; gap: 8px; max-width: 480px; margin: 0 auto; }
    .search-wrap input {
      flex: 1; padding: 11px 16px;
      border: 0.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: var(--blue); }
    .search-wrap input::placeholder { color: var(--text2); }
    .search-wrap button {
      padding: 11px 22px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .search-wrap button:hover { opacity: 0.88; }

    /* ── Main ── */
    main { max-width: 1100px; margin: 0 auto; padding: 0 2rem 4rem; }

    /* ── Categories ── */
    .categories { display: flex; gap: 8px; flex-wrap: wrap; padding: 2rem 0 1.25rem; }
    .tag {
      padding: 6px 16px; border-radius: 20px;
      font-size: 13px; cursor: pointer;
      border: 0.5px solid var(--border);
      color: var(--text2);
      background: var(--bg);
      transition: all 0.15s;
      user-select: none;
    }
    .tag:hover { border-color: var(--blue); color: var(--blue); }
    .tag.active { background: var(--blue); color: white; border-color: var(--blue); }

    /* ── Grid ── */
    .grid-meta { font-size: 13px; color: var(--text2); margin-bottom: 1rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .card {
      border-radius: 12px;
      overflow: hidden;
      border: 0.5px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .card:hover { transform: translateY(-3px); border-color: rgba(55,138,221,0.4); }
    .card-img {
      width: 100%; aspect-ratio: 16/10;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 500;
      position: relative; overflow: hidden;
    }
    .card-img img {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; inset: 0;
    }
    .card-img .placeholder {
      position: relative; z-index: 1;
      font-size: 13px; font-weight: 500;
    }
    .card-body { padding: 10px 12px 12px; }
    .card-title { font-size: 13px; font-weight: 500; margin-bottom: 5px; }
    .card-meta-row { display: flex; justify-content: space-between; align-items: center; }
    .card-cat { font-size: 11px; color: var(--text2); }
    .card-res {
      font-size: 11px; padding: 2px 7px;
      background: var(--blue-light);
      color: var(--blue);
      border-radius: 4px; font-weight: 500;
    }
    .card-actions { display: flex; gap: 6px; margin-top: 8px; }
    .btn-download {
      flex: 1; padding: 7px 0;
      background: var(--blue); color: white;
      border: none; border-radius: 8px;
      font-size: 12px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-download:hover { opacity: 0.88; }
    .btn-like {
      width: 32px; height: 32px;
      border: 0.5px solid var(--border);
      background: var(--bg);
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: border-color 0.15s;
    }
    .btn-like:hover { border-color: #E24B4A; }
    .btn-like.liked { background: #FCEBEB; border-color: #E24B4A; }

    /* ── Upload ── */
    .upload-modal {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.5);
      align-items: center; justify-content: center;
    }
    .upload-modal.open { display: flex; }
    .upload-box {
      background: var(--bg); border-radius: 16px;
      padding: 2rem; width: 100%; max-width: 420px;
      margin: 1rem;
    }
    .upload-box h2 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; }
    .upload-area {
      border: 1.5px dashed var(--border);
      border-radius: 10px; padding: 2.5rem;
      text-align: center; cursor: pointer;
      margin-bottom: 1rem; transition: border-color 0.15s;
    }
    .upload-area:hover { border-color: var(--blue); }
    .upload-area p { font-size: 14px; color: var(--text2); margin-top: 8px; }
    .upload-icon { font-size: 28px; }
    .upload-close {
      margin-top: 1rem; width: 100%;
      padding: 10px; border: 0.5px solid var(--border);
      background: transparent; color: var(--text2);
      border-radius: 8px; cursor: pointer; font-size: 14px;
    }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 24px; right: 24px;
      width: 48px; height: 48px;
      background: var(--blue); color: white;
      border: none; border-radius: 50%;
      font-size: 24px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;
    }
    .fab:hover { opacity: 0.88; }

    /* ── Footer ── */
    footer {
      border-top: 0.5px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-size: 13px;
      color: var(--text2);
    }

    @media (max-width: 600px) {
      .hero { padding: 2.5rem 1rem 1.5rem; }
      .hero h1 { font-size: 24px; }
      main { padding: 0 1rem 3rem; }
      header { padding: 0 1rem; }
      nav { display: none; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#">Wall<span>·</span>Hub</a>
  <nav>
    <a href="#">首页</a>
    <a href="#">最新</a>
    <a href="#">热门</a>
    <a href="#">关于</a>
  </nav>
</header>

<div class="hero">
  <h1>发现精美壁纸</h1>
  <p>免费下载高清壁纸，适配手机、桌面各类设备</p>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜索壁纸，例如：自然、城市..." />
    <button onclick="doSearch()">搜索</button>
  </div>
</div>

<main>
  <div class="categories" id="cats"></div>
  <div class="grid-meta" id="gridMeta"></div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  © 2025 Wall·Hub &nbsp;·&nbsp; 图片版权归原作者所有
</footer>

<!-- Upload modal -->
<div class="upload-modal" id="uploadModal">
  <div class="upload-box">
    <h2>上传壁纸</h2>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">↑</div>
      <p>点击选择图片，或拖拽到这里</p>
      <p style="font-size:12px;margin-top:4px;">支持 JPG、PNG、WebP，最大 20MB</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)" />
    <button class="upload-close" onclick="closeUpload()">取消</button>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="document.getElementById('uploadModal').classList.add('open')" title="上传壁纸">＋</button>

<script>
  /* ── 数据 ──
     替换下面的 wallpapers 数组来添加你自己的壁纸。
     imageUrl 填写你上传到 Cloudflare R2 或其他图床后得到的图片链接。
     留空则显示占位色块。
  */
  const wallpapers = [
    { id:1, title:"晨雾山脉",   cat:"自然风光", res:"4K",   imageUrl:"", color:"#B5D4F4", tc:"#0C447C" },
    { id:2, title:"赛博都市",   cat:"城市建筑", res:"2K",   imageUrl:"", color:"#CECBF6", tc:"#3C3489" },
    { id:3, title:"极简几何",   cat:"抽象艺术", res:"1080p",imageUrl:"", color:"#F4C0D1", tc:"#72243E" },
    { id:4, title:"星空银河",   cat:"自然风光", res:"4K",   imageUrl:"", color:"#C0DD97", tc:"#27500A" },
    { id:5, title:"日落海岸",   cat:"自然风光", res:"4K",   imageUrl:"", color:"#FAC775", tc:"#633806" },
    { id:6, title:"霓虹街道",   cat:"城市建筑", res:"2K",   imageUrl:"", color:"#9FE1CB", tc:"#085041" },
    { id:7, title:"水墨抽象",   cat:"抽象艺术", res:"1080p",imageUrl:"", color:"#F5C4B3", tc:"#712B13" },
    { id:8, title:"樱花庭院",   cat:"动漫插画", res:"1080p",imageUrl:"", color:"#FAEEDA", tc:"#633806" },
    { id:9, title:"雪山倒影",   cat:"自然风光", res:"4K",   imageUrl:"", color:"#E6F1FB", tc:"#185FA5" },
    { id:10,title:"工业风厂房", cat:"城市建筑", res:"2K",   imageUrl:"", color:"#D3D1C7", tc:"#444441" },
    { id:11,title:"流体渐变",   cat:"抽象艺术", res:"1080p",imageUrl:"", color:"#9FE1CB", tc:"#085041" },
    { id:12,title:"像素城市",   cat:"动漫插画", res:"1080p",imageUrl:"", color:"#CECBF6", tc:"#3C3489" },
  ];

  const cats = ["全部", ...new Set(wallpapers.map(w => w.cat))];
  let currentCat = "全部";
  let searchTerm = "";
  const liked = new Set();

  function renderCats() {
    document.getElementById('cats').innerHTML = cats.map(c =>
      `<div class="tag ${c === currentCat ? 'active' : ''}" onclick="selectCat('${c}')">${c}</div>`
    ).join('');
  }

  function selectCat(c) { currentCat = c; renderAll(); }

  function doSearch() {
    searchTerm = document.getElementById('searchInput').value.trim();
    renderAll();
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  function filtered() {
    return wallpapers.filter(w => {
      const matchCat = currentCat === "全部" || w.cat === currentCat;
      const matchSearch = !searchTerm || w.title.includes(searchTerm) || w.cat.includes(searchTerm);
      return matchCat && matchSearch;
    });
  }

  function toggleLike(id, btn) {
    if (liked.has(id)) { liked.delete(id); btn.classList.remove('liked'); btn.textContent = '♡'; }
    else { liked.add(id); btn.classList.add('liked'); btn.textContent = '♥'; }
  }

  function renderAll() {
    renderCats();
    const list = filtered();
    document.getElementById('gridMeta').textContent = `共 ${list.length} 张壁纸`;
    document.getElementById('grid').innerHTML = list.map(w => `
      <div class="card">
        <div class="card-img" style="background:${w.color}">
          ${w.imageUrl
            ? `<img src="${w.imageUrl}" alt="${w.title}" loading="lazy" />`
            : `<span class="placeholder" style="color:${w.tc}">${w.title}</span>`
          }
        </div>
        <div class="card-body">
          <div class="card-title">${w.title}</div>
          <div class="card-meta-row">
            <span class="card-cat">${w.cat}</span>
            <span class="card-res">${w.res}</span>
          </div>
          <div class="card-actions">
            <button class="btn-download" ${w.imageUrl ? `onclick="window.open('${w.imageUrl}')"` : ''}>
              ↓ 下载
            </button>
            <button class="btn-like ${liked.has(w.id) ? 'liked' : ''}" id="like-${w.id}"
              onclick="toggleLike(${w.id}, this)">
              ${liked.has(w.id) ? '♥' : '♡'}
            </button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function closeUpload() { document.getElementById('uploadModal').classList.remove('open'); }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    alert(`已选择文件：${file.name}\n\n提示：请将图片上传到 Cloudflare R2，然后把链接填入 index.html 中的 wallpapers 数组。`);
    closeUpload();
  }

  renderAll();
</script>
</body>
</html>
