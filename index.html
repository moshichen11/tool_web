    function bindStockDragSort() {
      const body = document.getElementById("stockWatchlistBody");
      if (!body || body.dataset.stockDragBound === "true") return;
      body.dataset.stockDragBound = "true";
      body.addEventListener("dragstart", handleStockDragStart);
      body.addEventListener("dragover", handleStockDragOver);
      body.addEventListener("drop", handleStockDrop);
      body.addEventListener("dragend", handleStockDragEnd);
      body.addEventListener("dragleave", event => {
        if (!event.relatedTarget || !body.contains(event.relatedTarget)) clearStockDragClasses();
      });
    }

    function handleStockDragStart(event) {
      const row = event.target.closest("[data-stock-row]");
      if (!row || activeFeature !== "stocks") {
        event.preventDefault();
        return;
      }
      stockDragState = {
        fromCode: row.dataset.stockCode,
        fromMarket: row.dataset.stockMarket,
        overCode: "",
        placement: "before"
      };
      row.classList.add("dragging");
      dragClickSuppress = true;
      if (event.dataTransfer) {
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", `${stockDragState.fromMarket}${stockDragState.fromCode}`);
      }
    }

    function handleStockDragOver(event) {
      if (!stockDragState.fromCode || activeFeature !== "stocks") return;
      const row = event.target.closest("[data-stock-row]");
      if (!row) return;
      const overIdentity = `${row.dataset.stockMarket}${row.dataset.stockCode}`;
      const fromIdentity = `${stockDragState.fromMarket}${stockDragState.fromCode}`;
      if (!overIdentity || overIdentity === fromIdentity) return;
      event.preventDefault();
      if (event.dataTransfer) event.dataTransfer.dropEffect = "move";
      stockDragState.overCode = row.dataset.stockCode;
      stockDragState.overMarket = row.dataset.stockMarket;
      stockDragState.placement = getDropPlacement(row, event);
      clearStockDragClasses();
      const draggingRow = document.querySelector(`[data-stock-code="${escapeSelector(stockDragState.fromCode)}"][data-stock-market="${escapeSelector(stockDragState.fromMarket)}"]`);
      draggingRow?.classList.add("dragging");
      row.classList.add(stockDragState.placement === "after" ? "drag-over-after" : "drag-over-before");
    }

    function handleStockDrop(event) {
      if (!stockDragState.fromCode || activeFeature !== "stocks") return;
      const row = event.target.closest("[data-stock-row]");
      if (!row) return;
      event.preventDefault();
      event.stopPropagation();
      const fromIdentity = `${stockDragState.fromMarket}${stockDragState.fromCode}`;
      const overIdentity = `${row.dataset.stockMarket}${row.dataset.stockCode}`;
      const fromIndex = stockWatchlist.findIndex(stock => getStockIdentity(stock) === fromIdentity);
      const overIndex = stockWatchlist.findIndex(stock => getStockIdentity(stock) === overIdentity);
      if (fromIndex < 0 || overIndex < 0 || fromIndex === overIndex) return;
      let toIndex = overIndex + (stockDragState.placement === "after" ? 1 : 0);
      if (fromIndex < toIndex) toIndex -= 1;
      reorderWatchlist(fromIndex, toIndex);
    }

    function handleStockDragEnd() {
      stockDragState = { fromCode: "", overCode: "", placement: "before" };
      clearStockDragClasses();
      suppressNextDragClick();
    }

    function drawStockCanvases() {
      const quotes = new Map([...marketIndices, ...stockUniverse, ...stockWatchlist].map(stock => [stock.id, stock]));
      document.querySelectorAll("canvas[data-stock-chart]").forEach(canvas => {
        const stock = quotes.get(canvas.dataset.stockChart);
        if (stock) {
          const days = Number(canvas.dataset.stockChartDays) || 18;
          const history = days === 5 ? (stock.history || []).slice(-5) : (stock.history || []);
          drawMiniKLine(canvas, history, stock.changePercent);
        }
      });
    }

    function drawMiniKLine(canvas, history, changePercent = 0) {
      const ctx = canvas.getContext?.("2d");
      if (!ctx || !history.length) return;
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(80, rect.width || Number(canvas.getAttribute("width")) || 120);
      const height = Math.max(34, rect.height || Number(canvas.getAttribute("height")) || 44);
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const highs = history.map(item => item.high);
      const lows = history.map(item => item.low);
      const max = Math.max(...highs);
      const min = Math.min(...lows);
      const range = Math.max(0.01, max - min);
      const pad = 5;
      const candleSpace = (width - pad * 2) / history.length;
      const candleWidth = Math.max(3, candleSpace * 0.48);
      const y = value => pad + (max - value) / range * (height - pad * 2);

      ctx.strokeStyle = "rgba(255,255,255,0.1)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad, height / 2);
      ctx.lineTo(width - pad, height / 2);
      ctx.stroke();

      history.forEach((item, index) => {
        const x = pad + candleSpace * index + candleSpace / 2;
        const up = item.close >= item.open;
        const color = up ? "#7ee787" : "#ff8b8b";
        const openY = y(item.open);
        const closeY = y(item.close);
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x, y(item.high));
        ctx.lineTo(x, y(item.low));
        ctx.stroke();
        const bodyY = Math.min(openY, closeY);
        const bodyH = Math.max(2, Math.abs(openY - closeY));
        ctx.globalAlpha = changePercent === 0 ? 0.72 : 0.92;
        ctx.fillRect(x - candleWidth / 2, bodyY, candleWidth, bodyH);
        ctx.globalAlpha = 1;
      });
    }

    function getVisibleDailyK() {
      const stock = getActiveDailyStock();
      if (!stock) return [];
      const data = getStockPeriodK(stock);
      const viewport = getStockDailyViewport(data);
      return data.slice(viewport.start, viewport.end);
    }

    function drawStockDailyCanvas() {
      const period = getStockDailyPeriod();
      if (isStockMinutePeriod(period)) {
        drawStockMinuteCanvas();
        return;
      }
      drawStockKCanvas();
    }

    function drawStockMinuteCanvas() {
      const canvas = document.querySelector("[data-stock-daily-chart]");
      const stock = getActiveDailyStock();
      const ctx = canvas?.getContext?.("2d");
      if (!canvas || !ctx || !stock) return;

      const fullData = getStockMinuteSeries(stock, activeStockDailyPeriod);
      const viewport = getStockDailyViewport(fullData);
      const data = fullData.slice(viewport.start, viewport.end);
      if (!data.length) return;

      const scrollbar = document.querySelector("[data-stock-daily-scroll]");
      if (scrollbar) {
        scrollbar.max = String(viewport.maxStart);
        scrollbar.value = String(viewport.start);
        scrollbar.disabled = viewport.maxStart <= 0;
      }

      const rect = canvas.getBoundingClientRect();
      const width = Math.max(460, rect.width || Number(canvas.getAttribute("width")) || 960);
      const height = Math.max(320, rect.height || Number(canvas.getAttribute("height")) || 420);
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const pad = { top: 18, right: 54, bottom: 32, left: 58 };
      const pricePane = { top: pad.top, bottom: Math.floor(height * 0.68) };
      pricePane.height = pricePane.bottom - pricePane.top;
      const volumePane = { top: pricePane.bottom + 24, bottom: height - pad.bottom };
      volumePane.height = volumePane.bottom - volumePane.top;
      const plotWidth = width - pad.left - pad.right;
      const prices = data.flatMap(item => [item.price, item.average]);
      const maxPrice = Math.max(...prices);
      const minPrice = Math.min(...prices);
      const priceRange = Math.max(0.01, maxPrice - minPrice);
      const maxVolume = Math.max(1, ...data.map(item => item.volume));
      const pointSpace = plotWidth / Math.max(1, data.length - 1);
      const xAt = index => pad.left + pointSpace * index;
      const priceY = value => pricePane.top + (maxPrice - value) / priceRange * pricePane.height;
      const volumeY = value => volumePane.bottom - (value / maxVolume) * volumePane.height;

      ctx.font = "11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.fillStyle = "rgba(255,255,255,0.42)";
      for (let i = 0; i <= 4; i++) {
        const y = pricePane.top + pricePane.height * i / 4;
        const price = maxPrice - priceRange * i / 4;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
        ctx.fillText(price.toFixed(2), 8, y + 4);
      }
      ctx.fillText("分时", pad.left, pricePane.top + 12);
      ctx.fillText("成交量", pad.left, volumePane.top + 12);

      const drawLine = (field, color, lineWidth = 1.4) => {
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        data.forEach((item, index) => {
          const x = xAt(index);
          const y = priceY(item[field]);
          if (index === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.lineWidth = 1;
      };

      const pointMeta = [];
      data.forEach((item, index) => {
        const x = xAt(index);
        const previous = data[index - 1] || item;
        const up = item.price >= previous.price;
        const barWidth = Math.max(1, Math.min(4, pointSpace * 0.62));
        const volTop = volumeY(item.volume);
        ctx.fillStyle = up ? "#7ee787" : "#ff8b8b";
        ctx.globalAlpha = 0.42;
        ctx.fillRect(x - barWidth / 2, volTop, barWidth, volumePane.bottom - volTop);
        ctx.globalAlpha = 1;
        pointMeta.push({ x, item });
      });

      drawLine("price", "#69cbff", 1.5);
      drawLine("average", "#ffd166", 1.2);

      ctx.fillStyle = "rgba(255,255,255,0.46)";
      ctx.fillText(data[0].label, pad.left, height - 12);
      ctx.fillText(data[data.length - 1].label, Math.max(pad.left, width - pad.right - 96), height - 12);

      canvas._dailyKMeta = {
        type: "minute",
        points: pointMeta,
        candles: pointMeta,
        viewport,
        panes: { pricePane, volumePane },
        plot: { left: pad.left, right: width - pad.right, top: pad.top, bottom: height - pad.bottom },
        candleSpace: pointSpace,
        width,
        height
      };
    }

    function drawStockKCanvas() {
      const canvas = document.querySelector("[data-stock-daily-chart]");
      const stock = getActiveDailyStock();
      const ctx = canvas?.getContext?.("2d");
      if (!canvas || !ctx || !stock) return;

      const fullData = getStockPeriodK(stock);
      const movingAverages = calculateStockMovingAverages(fullData);
      const macdValues = calculateStockMacd(fullData);
      const viewport = getStockDailyViewport(fullData);
      const data = fullData.slice(viewport.start, viewport.end);
      if (!data.length) return;

      const scrollbar = document.querySelector("[data-stock-daily-scroll]");
      if (scrollbar) {
        scrollbar.max = String(viewport.maxStart);
        scrollbar.value = String(viewport.start);
        scrollbar.disabled = viewport.maxStart <= 0;
      }

      const rect = canvas.getBoundingClientRect();
      const width = Math.max(460, rect.width || Number(canvas.getAttribute("width")) || 960);
      const height = Math.max(320, rect.height || Number(canvas.getAttribute("height")) || 420);
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const pad = { top: 18, right: 54, bottom: 32, left: 58 };
      const plotWidth = width - pad.left - pad.right;
      const candlePane = {
        top: pad.top,
        bottom: Math.max(250, Math.floor(height * 0.58)),
        get height() { return this.bottom - this.top; }
      };
      const volumePane = {
        top: candlePane.bottom + 22,
        bottom: Math.max(candlePane.bottom + 92, Math.floor(height * 0.76)),
        get height() { return this.bottom - this.top; }
      };
      const macdPane = {
        top: volumePane.bottom + 22,
        bottom: height - pad.bottom,
        get height() { return this.bottom - this.top; }
      };
      const globalIndexes = data.map((_, index) => viewport.start + index);
      const maVisibleValues = Object.values(movingAverages)
        .flatMap(series => globalIndexes.map(index => series[index]))
        .filter(value => Number.isFinite(value));
      const priceValues = [
        ...data.map(item => item.high),
        ...data.map(item => item.low),
        ...maVisibleValues
      ];
      const maxPrice = Math.max(...priceValues);
      const minPrice = Math.min(...priceValues);
      const priceRange = Math.max(0.01, maxPrice - minPrice);
      const maxVolume = Math.max(...data.map(item => item.volume), 1);
      const candleSpace = plotWidth / data.length;
      const candleWidth = Math.max(3, Math.min(15, candleSpace * 0.58));
      const priceY = value => candlePane.top + (maxPrice - value) / priceRange * candlePane.height;
      const volumeY = value => volumePane.bottom - (value / maxVolume) * volumePane.height;
      const visibleMacd = globalIndexes.map(index => macdValues[index]).filter(Boolean);
      const macdAbsMax = Math.max(
        0.01,
        ...visibleMacd.flatMap(item => [Math.abs(item.macd), Math.abs(item.dif), Math.abs(item.dea)])
      );
      const macdY = value => macdPane.top + (macdAbsMax - value) / (macdAbsMax * 2) * macdPane.height;
      const xAt = index => pad.left + candleSpace * index + candleSpace / 2;

      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.fillStyle = "rgba(255,255,255,0.42)";
      ctx.lineWidth = 1;
      ctx.font = "11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      const drawPaneGrid = (pane, label) => {
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        for (let i = 0; i <= 3; i++) {
          const y = pane.top + pane.height * i / 3;
          ctx.beginPath();
          ctx.moveTo(pad.left, y);
          ctx.lineTo(width - pad.right, y);
          ctx.stroke();
        }
        ctx.fillStyle = "rgba(255,255,255,0.42)";
        ctx.fillText(label, pad.left, pane.top + 12);
      };
      drawPaneGrid(candlePane, "K线");
      drawPaneGrid(volumePane, "成交量");
      drawPaneGrid(macdPane, "MACD");

      for (let i = 0; i <= 4; i++) {
        const y = candlePane.top + candlePane.height * i / 4;
        const price = maxPrice - priceRange * i / 4;
        ctx.fillStyle = "rgba(255,255,255,0.42)";
        ctx.fillText(price.toFixed(2), 8, y + 4);
      }

      const candleMeta = [];
      data.forEach((item, index) => {
        const x = xAt(index);
        const globalIndex = viewport.start + index;
        const up = item.close >= item.open;
        const color = up ? "#7ee787" : "#ff8b8b";
        const openY = priceY(item.open);
        const closeY = priceY(item.close);
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x, priceY(item.high));
        ctx.lineTo(x, priceY(item.low));
        ctx.stroke();
        ctx.fillRect(x - candleWidth / 2, Math.min(openY, closeY), candleWidth, Math.max(2, Math.abs(openY - closeY)));

        const volTop = volumeY(item.volume);
        ctx.globalAlpha = 0.46;
        ctx.fillRect(x - candleWidth / 2, volTop, candleWidth, volumePane.bottom - volTop);
        ctx.globalAlpha = 1;

        const macdItem = macdValues[globalIndex];
        if (macdItem) {
          const zeroY = macdY(0);
          const macdValueY = macdY(macdItem.macd);
          ctx.fillStyle = macdItem.macd >= 0 ? "#7ee787" : "#ff8b8b";
          ctx.globalAlpha = 0.72;
          ctx.fillRect(x - candleWidth / 2, Math.min(zeroY, macdValueY), candleWidth, Math.max(1, Math.abs(zeroY - macdValueY)));
          ctx.globalAlpha = 1;
        }

        candleMeta.push({
          x,
          item,
          globalIndex,
          ma: {
            ma5: movingAverages.ma5[globalIndex],
            ma10: movingAverages.ma10[globalIndex],
            ma30: movingAverages.ma30[globalIndex],
            ma60: movingAverages.ma60[globalIndex]
          },
          macd: macdValues[globalIndex]
        });
      });

      const drawSeriesLine = (series, color, yFn, pane) => {
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        let started = false;
        globalIndexes.forEach((globalIndex, localIndex) => {
          const value = series[globalIndex];
          if (!Number.isFinite(value)) {
            started = false;
            return;
          }
          const x = xAt(localIndex);
          const y = Math.max(pane.top, Math.min(pane.bottom, yFn(value)));
          if (!started) {
            ctx.moveTo(x, y);
            started = true;
          } else {
            ctx.lineTo(x, y);
          }
        });
        ctx.stroke();
        ctx.lineWidth = 1;
      };
      drawSeriesLine(movingAverages.ma5, "#ffd166", priceY, candlePane);
      drawSeriesLine(movingAverages.ma10, "#f78cfa", priceY, candlePane);
      drawSeriesLine(movingAverages.ma30, "#69cbff", priceY, candlePane);
      drawSeriesLine(movingAverages.ma60, "#a7f070", priceY, candlePane);
      drawSeriesLine(macdValues.map(item => item.dif), "#ffb86b", macdY, macdPane);
      drawSeriesLine(macdValues.map(item => item.dea), "#8f7dff", macdY, macdPane);

      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.beginPath();
      ctx.moveTo(pad.left, macdY(0));
      ctx.lineTo(width - pad.right, macdY(0));
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.46)";
      const first = data[0];
      const last = data[data.length - 1];
      ctx.fillText(first.date, pad.left, height - 12);
      ctx.fillText(last.date, Math.max(pad.left, width - pad.right - 78), height - 12);

      canvas._dailyKMeta = {
        candles: candleMeta,
        movingAverages,
        macdValues,
        viewport,
        panes: { candlePane, volumePane, macdPane },
        plot: { left: pad.left, right: width - pad.right, top: pad.top, bottom: height - pad.bottom },
        candleSpace,
        width,
        height
      };
    }

    function updateStockDailyChart() {
      const stock = getActiveDailyStock();
      const range = getStockDailyRange();
      const period = getStockDailyPeriod();
      if (!stock) return;
      document.querySelectorAll("[data-stock-daily-row]").forEach(row => {
        row.classList.toggle("active", row.dataset.stockDailyRow === stock.id);
        row.setAttribute("aria-pressed", String(row.dataset.stockDailyRow === stock.id));
      });
      document.querySelectorAll("[data-stock-daily-range]").forEach(button => {
        const active = button.dataset.stockDailyRange === range.id;
        button.classList.toggle("primary", active);
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", String(active));
      });
      document.querySelectorAll("[data-stock-daily-period]").forEach(button => {
        const active = button.dataset.stockDailyPeriod === period.id || (button.dataset.stockDailyPeriod === "more" && stockDailyMoreOpen);
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", String(active));
      });
      document.querySelectorAll(".stock-daily-range-row").forEach(row => {
        row.classList.toggle("is-hidden", !stockDailyMoreOpen);
      });
      const title = document.querySelector("[data-stock-daily-title]");
      const meta = document.querySelector("[data-stock-daily-meta]");
      if (title) title.textContent = `${stock.name} 分时/日K图`;
      if (meta) meta.textContent = `${stock.market} ${stock.code} · ${period.label} · ${range.label}`;
      const quote = document.querySelector("[data-stock-daily-quote]");
      if (quote) quote.outerHTML = renderStockDailyQuote(stock);
      const depth = document.querySelector("[data-stock-daily-depth]");
      if (depth) depth.outerHTML = renderStockDailyDepth(stock);
      drawStockDailyCanvas();
    }

    function handleStockDailyCanvasMove(event, canvas) {
      const meta = canvas?._dailyKMeta;
      const tooltip = document.getElementById("stockDailyTooltip");
      if (!meta?.candles?.length || !tooltip) return;
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const nearest = meta.candles.reduce((best, candle) =>
        Math.abs(candle.x - x) < Math.abs(best.x - x) ? candle : best
      , meta.candles[0]);
      if (!nearest) return;
      const item = nearest.item;
      if (meta.type === "minute") {
        tooltip.innerHTML = `
          <strong>${escapeHTML(item.label)}</strong><br>
          价格 ${formatStockPrice(item.price)} · 均价 ${formatStockPrice(item.average)}<br>
          成交量 ${formatStockVolume(item.volume)}
        `;
        tooltip.style.left = `${Math.min(Math.max(0, event.clientX - rect.left), rect.width - 210)}px`;
        tooltip.style.top = `${Math.min(Math.max(0, event.clientY - rect.top), rect.height - 110)}px`;
        tooltip.classList.add("is-visible");
        return;
      }
      const maText = [
        ["MA5", nearest.ma.ma5],
        ["MA10", nearest.ma.ma10],
        ["MA30", nearest.ma.ma30],
        ["MA60", nearest.ma.ma60]
      ].map(([label, value]) => `${label} ${Number.isFinite(value) ? formatStockPrice(value) : "--"}`).join(" · ");
      const macd = nearest.macd || { dif: 0, dea: 0, macd: 0 };
      tooltip.innerHTML = `
        <strong>${escapeHTML(item.date)}</strong><br>
        开盘 ${formatStockPrice(item.open)} · 收盘 ${formatStockPrice(item.close)}<br>
        最高 ${formatStockPrice(item.high)} · 最低 ${formatStockPrice(item.low)}<br>
        成交量 ${formatStockVolume(item.volume)}<br>
        ${escapeHTML(maText)}<br>
        DIF ${macd.dif.toFixed(3)} · DEA ${macd.dea.toFixed(3)} · MACD ${macd.macd.toFixed(3)}
      `;
      tooltip.style.left = `${Math.min(Math.max(0, event.clientX - rect.left), rect.width - 230)}px`;
      tooltip.style.top = `${Math.min(Math.max(0, event.clientY - rect.top), rect.height - 150)}px`;
      tooltip.classList.add("is-visible");
    }

    function hideStockDailyTooltip() {
      document.getElementById("stockDailyTooltip")?.classList.remove("is-visible");
    }

    function handleStockDailyWheel(event, canvas) {
      if (event.ctrlKey) {
        event.preventDefault();
        zoomStockDailyRange(event.deltaY < 0 ? -1 : 1);
        return;
      }
      const meta = canvas?._dailyKMeta;
      if (!meta?.viewport || meta.viewport.maxStart <= 0) return;
      event.preventDefault();
      const direction = (event.deltaX || event.deltaY) > 0 ? 1 : -1;
      updateStockDailyViewport(meta.viewport.start + direction * 3);
    }

    function getStockDailyPinchDistance() {
      const points = Array.from(stockDailyTouchPointers.values());
      if (points.length < 2) return 0;
      return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
    }

    function handleStockDailyPinchZoom(event) {
      if (!stockDailyTouchPointers.has(event.pointerId)) return false;
      stockDailyTouchPointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      const distance = getStockDailyPinchDistance();
      if (!distance) return false;
      if (!stockDailyPinchState) {
        stockDailyPinchState = { distance };
        return true;
      }
      const delta = distance - stockDailyPinchState.distance;
      if (Math.abs(delta) < 34) return true;
      zoomStockDailyRange(delta > 0 ? -1 : 1);
      stockDailyPinchState = { distance };
      return true;
    }

    function handleStockDailyPointerDown(event, canvas) {
      if (event.pointerType === "touch") {
        stockDailyTouchPointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
        if (stockDailyTouchPointers.size >= 2) {
          stockDailyPinchState = { distance: getStockDailyPinchDistance() };
        }
        return;
      }
      const meta = canvas?._dailyKMeta;
      if (!meta?.viewport || meta.viewport.maxStart <= 0) return;
      stockDailyDragState = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startIndex: meta.viewport.start,
        candleSpace: meta.candleSpace || 8
      };
      canvas.closest(".stock-daily-canvas-wrap")?.classList.add("is-dragging");
      canvas.setPointerCapture?.(event.pointerId);
    }

    function handleStockDailyPointerMove(event) {
      if (handleStockDailyPinchZoom(event)) return;
      if (!stockDailyDragState) return;
      const shift = Math.round((stockDailyDragState.startX - event.clientX) / Math.max(4, stockDailyDragState.candleSpace));
      updateStockDailyViewport(stockDailyDragState.startIndex + shift);
    }

    function handleStockDailyPointerUp(event) {
      stockDailyTouchPointers.delete(event.pointerId);
      if (stockDailyTouchPointers.size < 2) {
        stockDailyPinchState = null;
      }
      if (!stockDailyDragState) return;
      const canvas = document.querySelector("[data-stock-daily-chart]");
      canvas?.releasePointerCapture?.(event.pointerId);
      canvas?.closest(".stock-daily-canvas-wrap")?.classList.remove("is-dragging");
      stockDailyDragState = null;
    }

      const url = stock.detailUrl || `https://quote.eastmoney.com/${String(stock.market || "").toLowerCase()}${stock.code}.html`;

    function refreshCategorySection(categoryId) {
      const category = findCategory(categoryId);
      const section = document.getElementById(categoryId);
      if (category && section) {
        section.outerHTML = renderCategorySection(category);
      } else {
        renderNavigationPage();
      }
      observeSections();
    }

    function renderDynamic() {
      ensureActiveCategory();
      renderCategoryList();
      renderNavigationPage();
      observeSections();
    }

    function setActiveCategory(id) {
      if (!id || activeCategory === id) return;
      activeCategory = id;
      document.querySelectorAll(".category-item").forEach(button => {
        button.classList.toggle("active", button.dataset.target === id);
      });
    }

    function scrollToCategory(categoryId) {
      const target = document.getElementById(categoryId);
      if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function getDropPlacement(row, event) {
      const rect = row.getBoundingClientRect?.();
      if (!rect || typeof event.clientY !== "number") return "before";
      return event.clientY > rect.top + rect.height / 2 ? "after" : "before";
    }

    function clearCategoryDragClasses() {
      categoryList.querySelectorAll(".category-row").forEach(row => {
        row.classList.remove("dragging", "drag-over-before", "drag-over-after");
      });
    }

    function clearFeatureDragClasses() {
      featureList.querySelectorAll(".feature-button").forEach(button => {
        button.classList.remove("dragging", "drag-over");
      });
      featureList.classList.remove("dragging-list");
    }

    function suppressNextDragClick() {
      dragClickSuppress = true;
      setTimeout(() => {
        dragClickSuppress = false;
      }, 0);
    }

    function bindCategoryDragSort() {
      if (categoryList.dataset.categoryDragBound === "true") return;
      categoryList.dataset.categoryDragBound = "true";
      categoryList.addEventListener("dragstart", handleCategoryDragStart);
      categoryList.addEventListener("dragover", handleCategoryDragOver);
      categoryList.addEventListener("drop", handleCategoryDrop);
      categoryList.addEventListener("dragend", handleCategoryDragEnd);
      categoryList.addEventListener("dragleave", event => {
        if (!event.relatedTarget || !categoryList.contains(event.relatedTarget)) {
          clearCategoryDragClasses();
        }
      });
    }

    function handleCategoryDragStart(event) {
      const button = event.target.closest("[data-drag-type='category']");
      if (!button || activeFeature !== "navigation" || event.target.closest(".category-delete")) {
        event.preventDefault();
        return;
      }
      categoryDragState = {
        fromId: button.dataset.categoryId,
        overId: "",
        placement: "before"
      };
      button.closest(".category-row")?.classList.add("dragging");
      dragClickSuppress = true;
      if (event.dataTransfer) {
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", categoryDragState.fromId);
      }
    }

    function handleCategoryDragOver(event) {
      if (!categoryDragState.fromId || activeFeature !== "navigation") return;
      const row = event.target.closest(".category-row");
      if (!row || !categoryList.contains(row)) return;
      const overId = row.dataset.categoryId;
      if (!overId || overId === categoryDragState.fromId) return;
      event.preventDefault();
      if (event.dataTransfer) event.dataTransfer.dropEffect = "move";

      categoryDragState.overId = overId;
      categoryDragState.placement = getDropPlacement(row, event);
      clearCategoryDragClasses();
      const draggingRow = categoryList.querySelector(`[data-category-id="${escapeSelector(categoryDragState.fromId)}"]`);
      draggingRow?.classList.add("dragging");
      row.classList.add(categoryDragState.placement === "after" ? "drag-over-after" : "drag-over-before");
    }

    function handleCategoryDrop(event) {
      if (!categoryDragState.fromId || activeFeature !== "navigation") return;
      const row = event.target.closest(".category-row");
      if (!row || !categoryList.contains(row)) return;
      event.preventDefault();
      event.stopPropagation();

      const fromIndex = categories.findIndex(category => category.id === categoryDragState.fromId);
      const overIndex = categories.findIndex(category => category.id === row.dataset.categoryId);
      if (fromIndex < 0 || overIndex < 0 || fromIndex === overIndex) return;
      let toIndex = overIndex + (categoryDragState.placement === "after" ? 1 : 0);
      if (fromIndex < toIndex) toIndex -= 1;
      reorderCategories(fromIndex, toIndex);
    }

    function handleCategoryDragEnd() {
      categoryDragState = { fromId: "", overId: "", placement: "before" };
      clearCategoryDragClasses();
      suppressNextDragClick();
    }

    function reorderCategories(fromIndex, toIndex) {
      if (fromIndex < 0 || fromIndex >= categories.length) return false;
      const safeIndex = Math.max(0, Math.min(toIndex, categories.length - 1));
      if (fromIndex === safeIndex) return false;
      const [moved] = categories.splice(fromIndex, 1);
      categories.splice(safeIndex, 0, moved);
      ensureActiveCategory();
      saveUserConfig();
      renderDynamic();
      return true;
    }

    function bindFeatureDragSort() {
      if (featureList.dataset.featureDragBound === "true") return;
      featureList.dataset.featureDragBound = "true";
      featureList.addEventListener("dragstart", handleFeatureDragStart);
      featureList.addEventListener("dragover", handleFeatureDragOver);
      featureList.addEventListener("drop", handleFeatureDrop);
      featureList.addEventListener("dragend", handleFeatureDragEnd);
      featureList.addEventListener("dragleave", event => {
        if (!event.relatedTarget || !featureList.contains(event.relatedTarget)) {
          clearFeatureDragClasses();
        }
      });
    }

    function handleFeatureDragStart(event) {
      const button = event.target.closest("[data-drag-type='feature']");
      if (!button) {
        event.preventDefault();
        return;
      }
      featureDragState = {
        fromId: button.dataset.feature,
        overId: "",
        placement: "before"
      };
      button.classList.add("dragging");
      featureList.classList.add("dragging-list");
      dragClickSuppress = true;
      if (event.dataTransfer) {
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", featureDragState.fromId);
      }
    }

    function handleFeatureDragOver(event) {
      if (!featureDragState.fromId) return;
      const button = event.target.closest("[data-drag-type='feature']");
      if (!button || !featureList.contains(button)) return;
      const overId = button.dataset.feature;
      if (!overId || overId === featureDragState.fromId) return;
      event.preventDefault();
      if (event.dataTransfer) event.dataTransfer.dropEffect = "move";
      featureDragState.overId = overId;
      featureDragState.placement = getDropPlacement(button, event);
      clearFeatureDragClasses();
      featureList.classList.add("dragging-list");
      const draggingButton = featureList.querySelector(`[data-feature="${escapeSelector(featureDragState.fromId)}"]`);
      draggingButton?.classList.add("dragging");
      button.classList.add("drag-over");
    }

    function handleFeatureDrop(event) {
      if (!featureDragState.fromId) return;
      const button = event.target.closest("[data-drag-type='feature']");
      if (!button || !featureList.contains(button)) return;
      event.preventDefault();
      event.stopPropagation();

      const fromIndex = features.findIndex(feature => feature.id === featureDragState.fromId);
      const overIndex = features.findIndex(feature => feature.id === button.dataset.feature);
      if (fromIndex < 0 || overIndex < 0 || fromIndex === overIndex) return;
      let toIndex = overIndex + (featureDragState.placement === "after" ? 1 : 0);
      if (fromIndex < toIndex) toIndex -= 1;
      reorderFeatures(fromIndex, toIndex);
    }

    function handleFeatureDragEnd() {
      featureDragState = { fromId: "", overId: "", placement: "before" };
      clearFeatureDragClasses();
      suppressNextDragClick();
    }

    function reorderFeatures(fromIndex, toIndex) {
      if (fromIndex < 0 || fromIndex >= features.length) return false;
      const safeIndex = Math.max(0, Math.min(toIndex, features.length - 1));
      if (fromIndex === safeIndex) return false;
      const [moved] = features.splice(fromIndex, 1);
      features.splice(safeIndex, 0, moved);
      saveUserConfig();
      renderFeatureList();
      renderMobileTabbar();
      return true;
    }

    /* Memory Game Logic */
    function getMemoryBest(key) {
      try {
        const storageKey = memoryBestKeys[key];
        if (!storageKey) return null;
        const raw = localStorage.getItem(storageKey);
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    }

    function saveMemoryBest(key, elapsed, steps) {
      const storageKey = memoryBestKeys[key];
      if (!storageKey) return;
      const current = getMemoryBest(key);
      if (!current || elapsed < current.elapsed) {
        localStorage.setItem(storageKey, JSON.stringify({ elapsed, steps }));
      }
    }

    function formatMemoryTime(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const ss = (s % 60).toString().padStart(2, "0");
      const msPart = Math.floor((ms % 1000) / 10).toString().padStart(2, "0");
      return `${m}:${ss}.${msPart}`;
    }

    function startMemoryTimer() {
      if (memoryState.timerId) return;
      memoryState.timerId = setInterval(() => {
        memoryState.elapsed = performance.now() - memoryState.startTime;
        const timeNode = document.getElementById("memoryTime");
        if (timeNode) timeNode.textContent = formatMemoryTime(memoryState.elapsed);
      }, 50);
    }

    function stopMemoryTimer() {
      if (memoryState.timerId) {
        clearInterval(memoryState.timerId);
        memoryState.timerId = null;
      }
    }

    function initMemoryGame(rows = 4, cols = 4) {
      memoryState.rows = rows;
      memoryState.cols = cols;
      const pairCount = (rows * cols) / 2;
      const icons = [
        "⭐", "🌙", "☀️", "👼", "⚔️", "🔮", "👑", "🪶", "✝️", "🔥", "🌈", "✨", "🍀", "💎", "🗝️", "📜", "🕯️", "🌌",
        "🪐", "🔭", "☄️", "🏹", "⚖️", "🏺", "🧜", "🦄", "🐉", "🔱", "🧿", "🐚"
      ].slice(0, pairCount);
      const deck = [...icons, ...icons];
      
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }

      memoryState.cards = deck.map((icon, index) => ({ id: index, icon, flipped: false, matched: false }));
      memoryState.flipped = [];
      memoryState.matched = new Set();
      memoryState.steps = 0;
      memoryState.started = false;
      memoryState.finished = false;
      memoryState.startTime = 0;
      memoryState.elapsed = 0;
      memoryState.locked = false;
      stopMemoryTimer();
    }

    function resetMemoryGame(rows = memoryState.rows, cols = memoryState.cols) {
      initMemoryGame(rows, cols);
      renderAppShell();
    }

    function handleMemoryCardClick(event) {
      const cardEl = event.target.closest(".memory-card");
      if (!cardEl || memoryState.locked || memoryState.finished) return;

      const index = parseInt(cardEl.dataset.index);
      const card = memoryState.cards[index];
      if (card.flipped || card.matched) return;

      if (!memoryState.started) {
        memoryState.started = true;
        memoryState.startTime = performance.now();
        startMemoryTimer();
      }

      card.flipped = true;
      memoryState.flipped.push(index);
      cardEl.classList.add("is-flipped");

      if (memoryState.flipped.length === 2) {
        memoryState.steps += 1;
        memoryState.locked = true;
        const [idx1, idx2] = memoryState.flipped;
        const card1 = memoryState.cards[idx1];
        const card2 = memoryState.cards[idx2];

        if (card1.icon === card2.icon) {
          card1.matched = true;
          card2.matched = true;
          memoryState.matched.add(card1.icon);
          
          const el1 = document.querySelector(`.memory-card[data-index="${idx1}"]`);
          const el2 = document.querySelector(`.memory-card[data-index="${idx2}"]`);
          setTimeout(() => {
            el1.classList.add("is-matched");
            el2.classList.add("is-matched");
            memoryState.flipped = [];
            memoryState.locked = false;
            if (memoryState.matched.size === (memoryState.rows * memoryState.cols) / 2) {
              finishMemoryGame();
            }
          }, 400);
        } else {
          setTimeout(() => {
            card1.flipped = false;
            card2.flipped = false;
            const el1 = document.querySelector(`.memory-card[data-index="${idx1}"]`);
            const el2 = document.querySelector(`.memory-card[data-index="${idx2}"]`);
            el1.classList.remove("is-flipped");
            el2.classList.remove("is-flipped");
            memoryState.flipped = [];
            memoryState.locked = false;
          }, 800);
        }
        updateMemoryStats();
      }
    }

    function finishMemoryGame() {
      memoryState.finished = true;
      memoryState.elapsed = performance.now() - memoryState.startTime;
      stopMemoryTimer();
      const diffKey = `${memoryState.rows}x${memoryState.cols}`;
      saveMemoryBest(diffKey, memoryState.elapsed, memoryState.steps);
      updateMemoryStats();

      const panel = document.getElementById("memoryComplete");
      const timeNode = document.getElementById("memoryCompleteTime");
      const stepsNode = document.getElementById("memoryCompleteSteps");
      const bestNode = document.getElementById("memoryCompleteBest");
      
      if (timeNode) timeNode.textContent = formatMemoryTime(memoryState.elapsed);
      if (stepsNode) stepsNode.textContent = memoryState.steps;
      if (bestNode) {
        const best = getMemoryBest(diffKey);
        bestNode.textContent = best ? `${formatMemoryTime(best.elapsed)} (${best.steps}步)` : "--";
      }
      if (panel) panel.classList.remove("is-hidden");
    }

    function updateMemoryStats() {
      const stepsNode = document.getElementById("memorySteps");
      const progressNode = document.getElementById("memoryProgress");
      if (stepsNode) stepsNode.textContent = memoryState.steps;
      if (progressNode) progressNode.textContent = `${memoryState.matched.size}/${(memoryState.rows * memoryState.cols) / 2}`;
    }

    function renderMemoryGame() {
      if (!memoryState.cards.length) initMemoryGame();
      const diffKey = `${memoryState.rows}x${memoryState.cols}`;
      const best = getMemoryBest(diffKey);
      const diffButtons = memoryModes.map(d => `
        <button class="schulte-btn ${memoryState.rows === d.rows && memoryState.cols === d.cols ? "active" : ""}" type="button" data-memory-rows="${d.rows}" data-memory-cols="${d.cols}">
          ${d.label}
        </button>
      `).join("");

      return `
        <div class="memory-panel">
          <div class="memory-difficulty">${diffButtons}</div>
          <div class="memory-stats">
            <div class="memory-stat-card">
              <div class="memory-stat-label">当前用时</div>
              <div class="memory-stat-value" id="memoryTime">${formatMemoryTime(memoryState.elapsed)}</div>
            </div>
            <div class="memory-stat-card">
              <div class="memory-stat-label">翻牌步数</div>
              <div class="memory-stat-value" id="memorySteps">${memoryState.steps}</div>
            </div>
            <div class="memory-stat-card">
              <div class="memory-stat-label">已匹配</div>
              <div class="memory-stat-value" id="memoryProgress">${memoryState.matched.size}/${(memoryState.rows * memoryState.cols) / 2}</div>
            </div>
            <div class="memory-stat-card">
              <div class="memory-stat-label">最佳记录</div>
              <div class="memory-stat-value" id="memoryBest">${best ? formatMemoryTime(best.elapsed) : "--"}</div>
            </div>
          </div>
          <div class="memory-grid-scroll">
            <div class="memory-grid" style="--memory-cols: ${memoryState.cols}; --memory-rows: ${memoryState.rows}">
              ${memoryState.cards.map((card, index) => `
                <div class="memory-card ${card.flipped ? "is-flipped" : ""} ${card.matched ? "is-matched" : ""}" data-index="${index}">
                  <div class="card-face card-back">
                    <div class="magic-circle">
                      <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="48" stroke-dasharray="2 2" />
                        <circle cx="50" cy="50" r="40" />
                        <path d="M50 2 L50 98 M2 50 L98 50 M15 15 L85 85 M85 15 L15 85" opacity="0.5" />
                        <polygon points="50,5 95,50 50,95 5,50" />
                      </svg>
                    </div>
                    <div class="angel-icon">
                      <img src="angle.png" alt="Angel" loading="eager" decoding="async" fetchpriority="high" />
                    </div>
                  </div>
                  <div class="card-face card-front">${card.icon}</div>
                </div>
              `).join("")}
              <div id="memoryComplete" class="memory-complete is-hidden">
                <div class="memory-complete-card">
                  <h2>神谕已现</h2>
                  <p>星辰见证了你的智慧，所有的因果已然明了。</p>
                  <div class="memory-complete-stats">
                    <div class="memory-complete-stat">
                      <span class="memory-complete-label">本局用时</span>
                      <span class="memory-complete-value" id="memoryCompleteTime">0:00.00</span>
                    </div>
                    <div class="memory-complete-stat">
                      <span class="memory-complete-label">尝试步数</span>
                      <span class="memory-complete-value" id="memoryCompleteSteps">0</span>
                    </div>
                    <div class="memory-complete-stat" style="grid-column: span 2; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1);">
                      <span class="memory-complete-label">当前难度最佳记录</span>
                      <span class="memory-complete-value" id="memoryCompleteBest">--</span>
                    </div>
                  </div>
                  <button class="modal-btn primary" type="button" data-memory-restart style="width: 100%; height: 52px; border-radius: 14px; font-size: 16px; margin-top: 10px;">
                    重启星盘
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="game-controls">
            <button class="schulte-btn" type="button" data-memory-restart>重新开始</button>
            <button class="schulte-btn" type="button" data-memory-shuffle>换一局</button>
          </div>
        </div>
      `;
    }

    function shuffleNumbers(size) {
      const list = Array.from({ length: size * size }, (_, index) => index + 1);
      for (let i = list.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list;
    }

    function formatSchulteTime(seconds) {
      const safe = Math.max(0, seconds || 0);
      return `${safe.toFixed(1)}s`;
    }

    function getSchulteBestKey(size = schulteState.size) {
      return schulteBestKeys[size] || `glass_nav_schulte_best_${size}`;
    }

    function getSchulteBest(size = schulteState.size) {
      try {
        const value = Number(localStorage.getItem(getSchulteBestKey(size)));
        return Number.isFinite(value) && value > 0 ? value : 0;
      } catch (error) {
        return 0;
      }
    }

    function saveSchulteBest(size, seconds) {
      const currentBest = getSchulteBest(size);
      if (currentBest && currentBest <= seconds) return;
      try {
        localStorage.setItem(getSchulteBestKey(size), String(seconds));
      } catch (error) {
        return;
      }
    }

    function getSchulteElapsed() {
      if (!schulteState.started || !schulteState.startTime || schulteState.finished) return schulteState.elapsed;
      return (performance.now() - schulteState.startTime) / 1000;
    }

    function updateSchulteTimer() {
      const node = document.getElementById("schulteTime");
      if (node) node.textContent = formatSchulteTime(getSchulteElapsed());
      if (schulteState.started && !schulteState.finished) {
        schulteState.timerId = requestAnimationFrame(updateSchulteTimer);
      }
    }

    function stopSchulteTimer() {
      if (schulteState.timerId) {
        cancelAnimationFrame(schulteState.timerId);
        schulteState.timerId = null;
      }
    }

    function startSchulteTimer() {
      if (schulteState.timerId || schulteState.finished) return;
      updateSchulteTimer();
    }

    function updateSchulteStats() {
      const max = schulteState.size * schulteState.size;
      const targetNode = document.getElementById("schulteTarget");
      const timeNode = document.getElementById("schulteTime");
      const bestNode = document.getElementById("schulteBest");
      const difficultyNode = document.getElementById("schulteDifficulty");
      const progressNode = document.getElementById("schulteProgress");
      const progressValueNode = document.getElementById("schulteProgressValue");
      if (targetNode) targetNode.textContent = schulteState.finished ? "完成" : schulteState.next;
      if (timeNode) timeNode.textContent = formatSchulteTime(getSchulteElapsed());
      if (bestNode) {
        const best = getSchulteBest(schulteState.size);
        bestNode.textContent = best ? formatSchulteTime(best) : "--";
      }
      if (difficultyNode) difficultyNode.textContent = `${schulteState.size}×${schulteState.size}`;
      if (progressNode) progressNode.textContent = `完成进度：${schulteState.done.size}/${max}`;
      if (progressValueNode) progressValueNode.textContent = `${schulteState.done.size}/${max}`;
    }

    function bindSchulteEvents() {
      const grid = document.querySelector(".schulte-grid");
      if (!grid) return;
      grid.style.setProperty("--schulte-size", schulteState.size);
      grid.classList.add(`size-${schulteState.size}`);
      updateSchulteStats();
    }

    function finishSchulteGame() {
      schulteState.elapsed = getSchulteElapsed();
      schulteState.finished = true;
      stopSchulteTimer();
      saveSchulteBest(schulteState.size, schulteState.elapsed);
      updateSchulteStats();

      const panel = document.getElementById("schulteComplete");
      const timeNode = document.getElementById("schulteCompleteTime");
      const bestNode = document.getElementById("schulteCompleteBest");
      if (timeNode) timeNode.textContent = formatSchulteTime(schulteState.elapsed);
      if (bestNode) bestNode.textContent = formatSchulteTime(getSchulteBest(schulteState.size));
      if (panel) panel.classList.remove("is-hidden");
    }

    function initSchulteGame(size = 5) {
      schulteState.size = size;
      schulteState.numbers = shuffleNumbers(size);
      schulteState.next = 1;
      schulteState.started = false;
      schulteState.finished = false;
      schulteState.startTime = 0;
      schulteState.elapsed = 0;
      schulteState.done = new Set();
      stopSchulteTimer();
    }

    function resetSchulteGame(size = schulteState.size) {
      initSchulteGame(size);
      renderGamePage();
    }

    function handleSchulteCellClick(event) {
      event.preventDefault();
      event.stopPropagation();

      const cell = event.target.closest(".schulte-cell");
      if (!cell || schulteState.finished) return;

      const value = Number(cell.dataset.number);
      if (!value || schulteState.done.has(value)) return;

      if (value !== schulteState.next) {
        cell.classList.remove("wrong");
        void cell.offsetWidth;
        cell.classList.add("wrong");
        setTimeout(() => cell.classList.remove("wrong"), 180);
        return;
      }

      if (!schulteState.started) {
        schulteState.started = true;
        schulteState.startTime = performance.now();
        startSchulteTimer();
      }

      schulteState.done.add(value);
      schulteState.next += 1;
      cell.classList.add("done", "correct");
      cell.setAttribute("aria-disabled", "true");
      cell.textContent = "✓";
      setTimeout(() => cell.classList.remove("correct"), 200);
      updateSchulteStats();

      if (schulteState.next > schulteState.size * schulteState.size) finishSchulteGame();
    }

    function renderSchulteGame() {
      if (!schulteState.numbers.length) initSchulteGame(5);
      const max = schulteState.size * schulteState.size;
      const progress = `${schulteState.done.size}/${max}`;
      const best = getSchulteBest(schulteState.size);
      const difficultyButtons = [3, 4, 5, 6, 7, 8, 9, 10].map(size => `
        <button class="schulte-btn ${size === schulteState.size ? "active" : ""}" type="button" data-schulte-size="${size}">
          ${size}×${size}
        </button>
      `).join("");
      const cells = schulteState.numbers.map(value => {
        const done = schulteState.done.has(value);
        const classes = [
          "schulte-cell",
          done ? "done" : ""
        ].filter(Boolean).join(" ");
        return `
          <button class="${classes}" type="button" data-schulte-cell="${value}" data-number="${value}" ${done ? "aria-disabled='true' aria-label='已完成'" : `aria-label="数字 ${value}"`}>
            ${done ? "✓" : value}
          </button>
        `;
      }).join("");

      return `
        <div class="game-card glass">
          <div class="schulte-panel">
            <div class="schulte-topbar schulte-intro">
              <h2>苏尔特方格</h2>
              <p>按顺序从 1 找到最后一个数字，训练专注力与视觉搜索速度。</p>
              <div class="schulte-stats">
                <div class="schulte-stat">
                  <span>寻找数字</span>
                  <strong id="schulteTarget">${schulteState.finished ? "完成" : schulteState.next}</strong>
                </div>
                <div class="schulte-stat">
                  <span>用时</span>
                  <strong id="schulteTime">${formatSchulteTime(getSchulteElapsed())}</strong>
                </div>
                <div class="schulte-stat">
                  <span>最佳</span>
                  <strong id="schulteBest">${best ? formatSchulteTime(best) : "--"}</strong>
                </div>
                <div class="schulte-stat">
                  <span>难度</span>
                  <strong id="schulteDifficulty">${schulteState.size}×${schulteState.size}</strong>
                </div>
                <div class="schulte-stat">
                  <span>完成进度</span>
                  <strong id="schulteProgressValue">${progress}</strong>
                </div>
              </div>
              <div class="schulte-actions-row">
                <div class="schulte-difficulties" aria-label="难度选择">${difficultyButtons}</div>
                <div class="schulte-controls">
                  <button class="schulte-btn" type="button" data-schulte-restart>重新开始</button>
                  <button class="schulte-btn" type="button" data-schulte-shuffle>换一局</button>
                </div>
              </div>
            </div>
            <div class="schulte-board-wrap">
              <div class="schulte-grid size-${schulteState.size}" style="--schulte-size:${schulteState.size}" aria-label="苏尔特方格">
                ${cells}
              </div>
              <div class="schulte-complete ${schulteState.finished ? "" : "is-hidden"}" id="schulteComplete">
                <h3>挑战完成</h3>
                <p>本次用时 <span id="schulteCompleteTime">${formatSchulteTime(schulteState.elapsed)}</span>，最佳成绩 <span id="schulteCompleteBest">${formatSchulteTime(getSchulteBest(schulteState.size))}</span>。</p>
                <button class="schulte-btn active" type="button" data-schulte-restart>再来一局</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderEmojiGrid() {
      return `
        <div class="emoji-grid">
          ${emojiOptions.map(emoji => `
            <button class="emoji-choice ${emoji === selectedEmoji ? "active" : ""}" type="button" data-emoji="${escapeHTML(emoji)}" aria-label="选择 ${escapeHTML(emoji)}">
              ${escapeHTML(emoji)}
            </button>
          `).join("")}
        </div>
      `;
    }

    function openModal(state) {
      modalState = state;
      selectedEmoji = state.selectedEmoji || "";
      renderModal();
    }

    function closeModal() {
      if (modalState?.type === "confirm-import") configFileInput.value = "";
      modalState = null;
      selectedEmoji = "";
      modalRoot.innerHTML = "";
    }

    function modalShell(title, body, actions) {
      modalRoot.innerHTML = `
        <div class="modal-backdrop">
          <section class="modal-card" role="dialog" aria-modal="true" aria-label="${escapeHTML(title)}">
            <div class="modal-head">
              <h3 class="modal-title">${escapeHTML(title)}</h3>
              <button class="modal-close" type="button" data-modal-close aria-label="关闭">×</button>
            </div>
            <div class="modal-body">${body}</div>
            <div class="modal-actions">${actions}</div>
          </section>
        </div>
      `;
    }

    function renderModal() {
      if (!modalState) return;

      if (modalState.type === "add-category") {
        const draft = modalState.draft || {};
        modalShell("添加分类", `
          <div class="field">
            <label for="categoryName">分类名称</label>
            <input class="input" id="categoryName" type="text" value="${escapeHTML(draft.name || "")}" placeholder="例如：灵感收藏" />
          </div>
          <div class="emoji-picker">
            <div class="emoji-label">选择图标</div>
            ${renderEmojiGrid()}
          </div>
        `, `
          <button class="modal-btn" type="button" data-modal-close>取消</button>
          <button class="modal-btn primary" type="button" data-confirm-add-category>确认添加</button>
        `);
        document.getElementById("categoryName")?.focus();
        return;
      }

      if (modalState.type === "delete-category") {
        const category = findCategory(modalState.categoryId);
        if (!category) return closeModal();
        modalShell("删除分类", `
          <p class="confirm-copy">确定删除「${escapeHTML(category.name)}」吗？该分类下共有 ${category.sites.length} 个网站，删除后会一并移除。</p>
        `, `
          <button class="modal-btn" type="button" data-modal-close>取消</button>
          <button class="modal-btn danger" type="button" data-confirm-delete-category>确认删除</button>
        `);
        return;
      }

      if (modalState.type === "add-site") {
        modalShell("添加网站", `
          <div class="field">
            <label for="siteName">网站名称</label>
            <input class="input" id="siteName" type="text" placeholder="例如：OpenAI" />
          </div>
          <div class="field">
            <label for="siteUrl">网址 URL</label>
            <input class="input" id="siteUrl" type="url" placeholder="https://example.com" />
          </div>
          <div class="field">
            <label for="siteDesc">简短描述</label>
            <textarea class="textarea" id="siteDesc" placeholder="一句话描述这个网站"></textarea>
          </div>
        `, `
          <button class="modal-btn" type="button" data-modal-close>取消</button>
          <button class="modal-btn primary" type="button" data-confirm-add-site>确认添加</button>
        `);
        document.getElementById("siteName")?.focus();
        return;
      }

      if (modalState.type === "edit-site") {
        const site = findSite(modalState.categoryId, modalState.siteId);
        if (!site) return closeModal();
        const draft = modalState.draft || {};
        modalShell("编辑网站", `
          <div class="field">
            <label for="editSiteName">网站名称</label>
            <input class="input" id="editSiteName" type="text" value="${escapeHTML(draft.name ?? site.name)}" />
          </div>
          <div class="field">
            <label for="editSiteUrl">网址 URL</label>
            <input class="input" id="editSiteUrl" type="url" value="${escapeHTML(draft.url ?? site.url)}" />
          </div>
          <div class="field">
            <label for="editSiteDesc">简短描述</label>
            <textarea class="textarea" id="editSiteDesc">${escapeHTML(draft.desc ?? site.desc)}</textarea>
          </div>
          <div class="emoji-picker">
            <div class="emoji-label">自定义 emoji 图标</div>
            <div class="emoji-tools">
              <button class="emoji-auto ${selectedEmoji ? "" : "active"}" type="button" data-emoji-clear>自动 favicon</button>
            </div>
            ${renderEmojiGrid()}
          </div>
        `, `
          <button class="modal-btn" type="button" data-modal-close>取消</button>
          <button class="modal-btn primary" type="button" data-confirm-edit-site>确认保存</button>
        `);
        document.getElementById("editSiteName")?.focus();
        return;
      }

      if (modalState.type === "delete-site") {
        const site = findSite(modalState.categoryId, modalState.siteId);
        if (!site) return closeModal();
        modalShell("删除网站", `
          <p class="confirm-copy">确定删除「${escapeHTML(site.name)}」这张网站卡片吗？</p>
        `, `
          <button class="modal-btn" type="button" data-modal-close>取消</button>
          <button class="modal-btn danger" type="button" data-confirm-delete-site>确认删除</button>
        `);
        return;
      }

      if (modalState.type === "confirm-import") {
        modalShell("导入配置", `
          <p class="confirm-copy">导入配置会覆盖当前分类和网站，是否继续？</p>
        `, `
          <button class="modal-btn" type="button" data-modal-close>取消</button>
          <button class="modal-btn primary" type="button" data-confirm-import-config>继续导入</button>
        `);
        return;
      }

      if (modalState.type === "confirm-reset") {
        modalShell("恢复默认配置", `
          <p class="confirm-copy">恢复默认配置会清空当前本地配置，是否继续？</p>
        `, `
          <button class="modal-btn" type="button" data-modal-close>取消</button>
          <button class="modal-btn danger" type="button" data-confirm-reset-config>恢复默认</button>
        `);
      }
    }

    function readSiteFields(prefix = "") {
      const nameId = prefix ? `${prefix}SiteName` : "siteName";
      const urlId = prefix ? `${prefix}SiteUrl` : "siteUrl";
      const descId = prefix ? `${prefix}SiteDesc` : "siteDesc";
      const name = document.getElementById(nameId)?.value.trim() || "";
      const url = normalizeUrl(document.getElementById(urlId)?.value || "");
      const desc = document.getElementById(descId)?.value.trim() || "";
      if (!name) {
        alert("请输入网站名称");
        return null;
      }
      if (!url) {
        alert("请输入有效的网址 URL");
        return null;
      }
      if (!desc) {
        alert("请输入简短描述");
        return null;
      }
      return { name, url, desc };
    }

    function saveModalDraft() {
      if (!modalState) return;
      if (modalState.type === "add-category") {
        modalState.draft = {
          name: document.getElementById("categoryName")?.value || ""
        };
      }
      if (modalState.type === "edit-site") {
        modalState.draft = {
          name: document.getElementById("editSiteName")?.value || "",
          url: document.getElementById("editSiteUrl")?.value || "",
          desc: document.getElementById("editSiteDesc")?.value || ""
        };
      }
    }

    function observeSections() {
      if (sectionObserver) sectionObserver.disconnect();
      if (activeFeature !== "navigation") return;
      const sections = document.querySelectorAll(".section");
      if (!sections.length) return;

      const searchHeight = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--search-h"), 10) || 56;
      sectionObserver = new IntersectionObserver(entries => {
        const visible = entries
          .filter(entry => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (visible) setActiveCategory(visible.target.dataset.category);
      }, {
        root: mainScroll,
        threshold: [0.18, 0.32, 0.48],
        rootMargin: `-${searchHeight}px 0px -45% 0px`
      });

      sections.forEach(section => sectionObserver.observe(section));
    }

    function handleConfigAction(event) {
      const button = event.target.closest("[data-config-action]");
      if (!button || !["navigation", "settings"].includes(activeFeature)) return;
      event.preventDefault();
      event.stopPropagation();
      const action = button.dataset.configAction;
      if (action === "import") {
        configFileInput.click();
      }
      if (action === "export") {
        exportUserConfig();
      }
      if (action === "reset") {
        openModal({ type: "confirm-reset" });
      }
    }

    addCategoryBtn.addEventListener("click", event => {
      event.preventDefault();
      event.stopPropagation();
      if (activeFeature !== "navigation") return;
      openModal({ type: "add-category", selectedEmoji: "⭐" });
    });

    mobileAddCategoryBtn.addEventListener("click", event => {
      event.preventDefault();
      event.stopPropagation();
      if (activeFeature !== "navigation") return;
      openModal({ type: "add-category", selectedEmoji: "⭐" });
    });

    configFileInput.addEventListener("change", () => {
      const file = configFileInput.files?.[0];
      if (!file) return;
      openModal({ type: "confirm-import", file });
    });

    categoryList.addEventListener("click", event => {
      if (dragClickSuppress) {
        event.preventDefault();
        event.stopPropagation();
        return;
      }

      if (activeFeature === "settings") {
        handleConfigAction(event);
        return;
      }

      if (activeFeature === "stocks") {
        const viewButton = event.target.closest("[data-stock-view]");
        if (!viewButton) return;
        setActiveStockView(viewButton.dataset.stockView);
        return;
      }

      if (activeFeature === "game") {
        const gameButton = event.target.closest("[data-game]");
        if (!gameButton || gameButton.disabled) return;
        activeGame = gameButton.dataset.game;
        renderAppShell();
        return;
      }

      if (activeFeature !== "navigation") return;

      const deleteButton = event.target.closest("[data-delete-category]");
      if (deleteButton) {
        openModal({ type: "delete-category", categoryId: deleteButton.dataset.deleteCategory });
        return;
      }

      const button = event.target.closest(".category-item");
      if (!button) return;
      setActiveCategory(button.dataset.target);
      scrollToCategory(button.dataset.target);
    });

    engineTabs.addEventListener("click", event => {
      const button = event.target.closest(".engine-tab");
      if (!button) return;
      activeEngine = button.dataset.engine;
      renderEngineTabs();
    });

    featureList.addEventListener("click", event => {
      if (dragClickSuppress) {
        event.preventDefault();
        event.stopPropagation();
        return;
      }

      const button = event.target.closest(".feature-button");
      if (!button || button.dataset.feature === activeFeature) return;
      activeFeature = button.dataset.feature;
      renderAppShell();
    });

    mobileTabbar.addEventListener("click", event => {
      const button = event.target.closest("[data-mobile-feature]");
      if (!button || button.dataset.mobileFeature === activeFeature) return;
      activeFeature = button.dataset.mobileFeature;
      renderAppShell();
    });

    content.addEventListener("click", event => {
      if (activeFeature === "settings") {
        const unlockBtn = event.target.closest("#unlockBtn");
        if (unlockBtn) {
          if (isUnlocked) {
            showToast("功能已解锁，无需重复输入");
            return;
          }
          const pwd = document.getElementById("unlockPassword")?.value;
          if (pwd === "1412") {
            isUnlocked = true;
            localStorage.setItem(UNLOCKED_KEY, "true");
            showToast("隐藏功能已解锁", "success");
            renderFeatureList();
            renderMobileTabbar();
            renderSettingsPage();
          } else {
            showToast("密码错误", "error");
          }
          return;
        }
        handleConfigAction(event);
        return;
      }

      if (activeFeature === "stocks") {
        handleStockContentClick(event);
        return;
      }

      if (activeFeature === "game") {
        const gameButton = event.target.closest("[data-game]");
        if (gameButton && !gameButton.disabled) {
          activeGame = gameButton.dataset.game;
          renderAppShell();
          return;
        }

        // Memory Game Handlers
        if (activeGame === "memory") {
          const card = event.target.closest(".memory-card");
          if (card) {
            handleMemoryCardClick(event);
            return;
          }

          const diffBtn = event.target.closest("[data-memory-rows]");
          if (diffBtn) {
            resetMemoryGame(Number(diffBtn.dataset.memoryRows), Number(diffBtn.dataset.memoryCols));
            return;
          }

          if (event.target.closest("[data-memory-restart]") || event.target.closest("[data-memory-shuffle]")) {
            resetMemoryGame();
            return;
          }
        }

        const sizeButton = event.target.closest("[data-schulte-size]");
        if (sizeButton) {
          event.preventDefault();
          event.stopPropagation();
          resetSchulteGame(Number(sizeButton.dataset.schulteSize));
          return;
        }

        if (event.target.closest("[data-schulte-restart]") || event.target.closest("[data-schulte-shuffle]")) {
          event.preventDefault();
          event.stopPropagation();
          resetSchulteGame(schulteState.size);
          return;
        }

        const cell = event.target.closest("[data-schulte-cell]");
        if (cell) {
          handleSchulteCellClick(event);
          return;
        }
      }

      if (activeFeature !== "navigation") return;

      const addButton = event.target.closest("[data-add-site]");
      if (addButton) {
        openModal({ type: "add-site", categoryId: addButton.dataset.addSite });
        return;
      }

      const editButton = event.target.closest("[data-edit-site]");
      if (editButton) {
        const site = findSite(editButton.dataset.categoryId, editButton.dataset.editSite);
        openModal({
          type: "edit-site",
          categoryId: editButton.dataset.categoryId,
          siteId: editButton.dataset.editSite,
          selectedEmoji: site?.iconEmoji || ""
        });
        return;
      }

      const deleteButton = event.target.closest("[data-delete-site]");
      if (deleteButton) {
        openModal({
          type: "delete-site",
          categoryId: deleteButton.dataset.categoryId,
          siteId: deleteButton.dataset.deleteSite
        });
        return;
      }

      const card = event.target.closest(".site-card");
      if (card) {
        const site = findSite(card.dataset.categoryId, card.dataset.siteId);
        if (site) window.open(site.url, "_blank", "noopener,noreferrer");
      }
    });

    content.addEventListener("submit", event => {
      if (activeFeature !== "stocks") return;
      const form = event.target.closest("#stockSearchForm");
      if (!form) return;
      event.preventDefault();
      const input = document.getElementById("stockSearchInput");
      stockSearchTerm = input?.value.trim() || "";
      const first = searchStocks(stockSearchTerm)[0];
      if (first) openStockDetail(first);
      else renderStockPage();
    });

    content.addEventListener("input", event => {
      if (activeFeature !== "stocks") return;
      const dailyScroll = event.target.closest("[data-stock-daily-scroll]");
      if (dailyScroll) {
        updateStockDailyViewport(Number(dailyScroll.value));
        return;
      }
      const filterSearch = event.target.closest("#stockFilterSearchInput");
      if (filterSearch) {
        setStockFilterSearch(filterSearch.value);
        return;
      }
      const input = event.target.closest("#stockSearchInput");
      if (!input) return;
      stockSearchTerm = input.value.trim();
      const results = document.getElementById("stockSearchResults");
      if (results) results.innerHTML = renderStockSearchResults();
    });

    content.addEventListener("scroll", event => {
      if (activeFeature !== "stocks") return;
      const dailyList = event.target.closest("[data-stock-daily-list]");
      if (!dailyList) return;
      handleStockDailyListScroll(dailyList);
    }, true);

    content.addEventListener("change", event => {
      if (activeFeature !== "stocks") return;
      const dailySort = event.target.closest("[data-stock-daily-sort]");
      if (dailySort) {
        setStockDailySort(dailySort.value);
        return;
      }
      if (!event.target.closest("[data-stock-filter]")) return;
      updateStockFiltersFromForm();
    });

    content.addEventListener("mousemove", event => {
      if (activeFeature !== "stocks") return;
      const dailyCanvas = event.target.closest("[data-stock-daily-chart]");
      if (!dailyCanvas) return;
      handleStockDailyCanvasMove(event, dailyCanvas);
    });

    content.addEventListener("mouseout", event => {
      if (activeFeature !== "stocks") return;
      if (!event.target.closest("[data-stock-daily-chart]")) return;
      hideStockDailyTooltip();
    });

    content.addEventListener("wheel", event => {
      if (activeFeature !== "stocks") return;
      const dailyCanvas = event.target.closest("[data-stock-daily-chart]");
      if (!dailyCanvas) return;
      handleStockDailyWheel(event, dailyCanvas);
    }, { passive: false });

    content.addEventListener("pointerdown", event => {
      if (activeFeature !== "stocks") return;
      const dailyCanvas = event.target.closest("[data-stock-daily-chart]");
      if (!dailyCanvas) return;
      handleStockDailyPointerDown(event, dailyCanvas);
    });

    content.addEventListener("pointermove", event => {
      if (activeFeature !== "stocks") return;
      handleStockDailyPointerMove(event);
    });

    content.addEventListener("pointerup", event => {
      if (activeFeature !== "stocks") return;
      handleStockDailyPointerUp(event);
    });

    content.addEventListener("pointercancel", event => {
      if (activeFeature !== "stocks") return;
      handleStockDailyPointerUp(event);
    });

    content.addEventListener("keydown", event => {
      if (activeFeature === "settings" && event.key === "Enter") {
        const input = event.target.closest("#unlockPassword");
        if (input) {
          event.preventDefault();
          document.getElementById("unlockBtn")?.click();
          return;
        }
      }
      if (activeFeature === "stocks") {
        const result = event.target.closest(".stock-result");
        if (result && ["Enter", " "].includes(event.key)) {
          event.preventDefault();
          openStockDetail(result.dataset.stockOpen, result.dataset.stockMarket);
          return;
        }
        const filterRow = event.target.closest("[data-stock-filter-row]");
        if (filterRow && ["Enter", " "].includes(event.key)) {
          event.preventDefault();
          toggleStockFilterRowExpand(filterRow.dataset.stockCode, filterRow.dataset.stockMarket);
          return;
        }
        const row = event.target.closest("[data-stock-row]");
        if (row && ["Enter", " "].includes(event.key)) {
          event.preventDefault();
          toggleStockRowExpand(row.dataset.stockCode, row.dataset.stockMarket);
        }
        return;
      }
      if (activeFeature !== "navigation") return;
      const card = event.target.closest(".site-card");
      if (!card || !["Enter", " "].includes(event.key)) return;
      event.preventDefault();
      const site = findSite(card.dataset.categoryId, card.dataset.siteId);
      if (site) window.open(site.url, "_blank", "noopener,noreferrer");
    });

    modalRoot.addEventListener("click", event => {
      if (event.target.classList.contains("modal-backdrop") || event.target.closest("[data-modal-close]")) {
        closeModal();
        return;
      }

      const emojiButton = event.target.closest("[data-emoji]");
      if (emojiButton) {
        saveModalDraft();
        selectedEmoji = emojiButton.dataset.emoji;
        renderModal();
        return;
      }

      if (event.target.closest("[data-emoji-clear]")) {
        saveModalDraft();
        selectedEmoji = "";
        renderModal();
        return;
      }

      if (event.target.closest("[data-confirm-add-category]")) {
        const name = document.getElementById("categoryName")?.value.trim() || "";
        if (!name) {
          alert("请输入分类名称");
          return;
        }
        const category = { id: makeId(), emoji: selectedEmoji || "📁", name, sites: [] };
        categories.push(category);
        activeCategory = category.id;
        saveUserConfig();
        closeModal();
        renderDynamic();
        requestAnimationFrame(() => scrollToCategory(category.id));
        return;
      }

      if (event.target.closest("[data-confirm-delete-category]")) {
        const index = categories.findIndex(category => category.id === modalState.categoryId);
        if (index >= 0) categories.splice(index, 1);
        saveUserConfig();
        closeModal();
        renderDynamic();
        return;
      }

      if (event.target.closest("[data-confirm-add-site]")) {
        const fields = readSiteFields("");
        if (!fields) return;
        const category = findCategory(modalState.categoryId);
        if (!category) return closeModal();
        category.sites.push({ id: makeId(), iconEmoji: "", ...fields });
        activeCategory = category.id;
        saveUserConfig();
        closeModal();
        renderCategoryList();
        refreshCategorySection(category.id);
        requestAnimationFrame(() => scrollToCategory(category.id));
        return;
      }

      if (event.target.closest("[data-confirm-edit-site]")) {
        const fields = readSiteFields("edit");
        if (!fields) return;
        const site = findSite(modalState.categoryId, modalState.siteId);
        if (!site) return closeModal();
        const categoryId = modalState.categoryId;
        Object.assign(site, fields, { iconEmoji: selectedEmoji || "" });
        saveUserConfig();
        closeModal();
        refreshCategorySection(categoryId);
        return;
      }

      if (event.target.closest("[data-confirm-delete-site]")) {
        const category = findCategory(modalState.categoryId);
        if (category) {
          const index = category.sites.findIndex(site => site.id === modalState.siteId);
          if (index >= 0) category.sites.splice(index, 1);
        }
        const categoryId = modalState.categoryId;
        saveUserConfig();
        closeModal();
        refreshCategorySection(categoryId);
        return;
      }

      if (event.target.closest("[data-confirm-import-config]")) {
        if (modalState.file) importUserConfigFromFile(modalState.file);
        return;
      }

      if (event.target.closest("[data-confirm-reset-config]")) {
        resetUserConfig();
      }
    });

    searchForm.addEventListener("submit", event => {
      event.preventDefault();
      if (activeFeature !== "navigation") return;
      const keyword = searchInput.value.trim();
      if (!keyword) {
        searchInput.focus();
        return;
      }
      const engine = engines.find(item => item.id === activeEngine) || engines[0];
      window.open(engine.url + encodeURIComponent(keyword), "_blank", "noopener,noreferrer");
    });

    const initialConfig = loadUserConfig();
    features = initialConfig.features;
    categories = initialConfig.categories;
    hydrateIds();
    stockWatchlist = loadStockWatchlist();
    customStockStrategies = loadCustomStockStrategies();
    restoreStockFilterState();
    initSchulteGame(5);
    renderAppShell();
  </script>
</body>
</html>
