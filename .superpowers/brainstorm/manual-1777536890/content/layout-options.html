<style>
  .layout-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    margin-top: 22px;
  }

  .visual-card {
    min-height: 520px;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.22);
    background: #111827;
    cursor: pointer;
    position: relative;
  }

  .visual-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('/files/bg-reference.png') center/cover;
    opacity: .74;
    transform: scale(1.08);
  }

  .visual-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 28% 18%, rgba(255,255,255,.28), transparent 22%),
      linear-gradient(145deg, rgba(15,23,42,.74), rgba(76,29,149,.35), rgba(8,13,28,.82));
  }

  .visual-inner {
    position: relative;
    z-index: 1;
    height: 100%;
    padding: 14px;
    color: white;
    display: grid;
    gap: 12px;
  }

  .glass {
    border: 1px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.12);
    box-shadow: 0 18px 50px rgba(0,0,0,.22);
    backdrop-filter: blur(16px);
  }

  .mini-sidebar {
    width: 64px;
    border-radius: 14px;
    padding: 12px 8px;
    display: grid;
    gap: 10px;
    align-content: start;
  }

  .mini-dot {
    height: 34px;
    border-radius: 11px;
    display: grid;
    place-items: center;
    font-size: 16px;
    background: rgba(255,255,255,.12);
  }

  .mini-dot.active {
    background: linear-gradient(135deg, rgba(96,165,250,.9), rgba(217,70,239,.85));
  }

  .mini-main {
    border-radius: 18px;
    padding: 14px;
  }

  .mini-title {
    width: 72%;
    height: 24px;
    border-radius: 999px;
    background: rgba(255,255,255,.74);
    margin-bottom: 10px;
  }

  .mini-line {
    height: 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.34);
    margin-bottom: 8px;
  }

  .mini-widgets {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 16px;
  }

  .mini-widget {
    height: 82px;
    border-radius: 14px;
    background: rgba(255,255,255,.13);
    border: 1px solid rgba(255,255,255,.16);
  }

  .mini-wallpapers {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }

  .mini-wallpapers div {
    height: 62px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(147,197,253,.8), rgba(216,180,254,.78));
  }

  .layout-a .visual-inner {
    grid-template-columns: 64px 1fr;
  }

  .layout-b .visual-inner {
    align-content: center;
  }

  .layout-b .mini-main {
    min-height: 240px;
  }

  .layout-c .visual-inner {
    grid-template-rows: 56px 1fr;
  }

  .topbar {
    border-radius: 14px;
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 10px;
  }

  .pill {
    height: 18px;
    border-radius: 999px;
    background: rgba(255,255,255,.32);
  }

  .meta-title {
    position: relative;
    z-index: 2;
    color: white;
    padding: 16px 16px 18px;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,.54));
    margin-top: -118px;
    min-height: 118px;
  }

  .meta-title h3 {
    color: white;
    margin: 0 0 6px;
    font-size: 18px;
  }

  .meta-title p {
    color: rgba(255,255,255,.78);
    margin: 0;
    font-size: 13px;
    line-height: 1.5;
  }

  @media (max-width: 980px) {
    .layout-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
